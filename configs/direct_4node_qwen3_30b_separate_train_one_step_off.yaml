# =============================================================
# Agentic RL提供两种运行模式：
# 1. SERVE MODE     服务化部署，提供 HTTP/HTTPS 访问能力（如：多轮对话、模型推理等）
# 2. DIRECT MODE    直连模式，提供单次 JOB 执行能力（如：单次训练作业等）
# =============================================================
agentic_ai:
  mode: serve # 模式选择：serve | direct
  log_level: DEBUG
  log_dir: /var/log/

serve_conf:
  host: 0.0.0.0
  port: 8030

direct_conf:
  entrypoints:
    - job_type: train
      job_name: RL-QWEN-30B-WITH-MATH-16NPU
      job_kwargs: { }

# =============================================================
# Train 预定义任务：
# 1. 预定义任务包括采用RL框架类型、参数等等，初始化时占用资源，触发后开始训练（支持开始、暂停、取消）
# 2. SERVE 模式下，预定义任务列表默认为空; DIRECT 模式下，初始化任务等待触发训练（触发：direct_conf.entrypoints）
# =============================================================
defaults:
  - msrl_conf: base_integrated_grpo_trainer_template_qwen3_30b # MindSpeed RL原始配置模板，参数值在rl_framework_kwargs中被覆盖
  - verl_conf: null
  - _self_

# 覆盖MSRL模板中的参数
msrl_conf:
  megatron_training:
    global_batch_size: 8
    train_iters: 10
    tokenizer_name_or_path: /opt/DPC/models/l00649956/models/Qwen3-30B-A3B
    data_path: /opt/DPC/models/l00619320/code/AGENTIC_RL_WS/AgenticRL_Binary_Files/dataset/deepscaler_math_01/rl
  actor_config:
    load: /opt/DPC/models/l00649956/save_ckpts/qwen3_30b/new_tp4pp1ep2
    save: /opt/DPC/models/l00619320/save_ckpts/
  rl_config:
    n_samples_per_prompt: 4
    actor_resource:
      num_npus: 16
  generate_config:
    weight_save_dir: /opt/DPC/models/l00619320/save_weights22

train_instances: []
