# =============================================================
# Agentic RL提供两种运行模式：
# 1. SERVE MODE     服务化部署，提供 HTTP/HTTPS 访问能力（如：多轮对话、模型推理等）
# 2. DIRECT MODE    直连模式，提供单次 JOB 执行能力（如：单次训练作业等）
# =============================================================
agentic_ai:
  mode: direct # 模式选择：serve | direct
  log_level: DEBUG
  log_dir: /var/log/

serve_conf:
  host: 0.0.0.0
  port: 8030

direct_conf:
  entrypoints:
    - job_type: train
      job_name: RL-QWEN-7B-WITH-DTN-8NPU
      job_kwargs: { }

# =============================================================
# Train 预定义任务：
# 1. 预定义任务包括采用RL框架类型、参数等等，初始化时占用资源，触发后开始训练（支持开始、暂停、取消）
# 2. SERVE 模式下，预定义任务列表默认为空; DIRECT 模式下，初始化任务等待触发训练（触发：direct_conf.entrypoints）
# =============================================================
defaults:
  - msrl_conf: grpo_trainer_qwen25_7b_1node # MindSpeed RL原始配置模板，参数值在rl_framework_kwargs中被覆盖
  - verl_conf: null
  - _self_

# 覆盖MSRL模板中的参数
msrl_conf:
  megatron_training:
    data_path: /opt/DPC/models/w00623271/TrainingOutput/v0728_rca_58case_2tool_6turn_qwq/data/data_bin/rl

train_instances:
  - name: RL-QWEN-7B-WITH-DTN-8NPU
    executor_num: 1
    executor_kwargs:
      # 以下参数为 TrainExecutor 初始化参数
      work_mode: hybrid  # hybrid(共卡) | one_step_off(分离), 当前该字段暂未生效，还依赖于env配置
      rl_framework: mindspeed_rl
      rl_framework_kwargs:
        # 以下参数为 MindSpeed RL 初始化参数
        msrl_conf: ${msrl_conf}
      agent_service: DTN  # 依赖的 AGENT 服务名称
      infer_service: Qwen2.5-7B-Instruct  # 依赖的 INFER 服务名称
    resource_info: [ ]  # MSRL 训练采用 RAY 实现资源分配，在 Executor 层不做资源限制


# =============================================================
# Agent 预置服务：
# 1. 提供如：Math / WebSearch 等智能体对话服务
# =============================================================
agent_instances:
  - name: DTN
    executor_num: 1
    executor_kwargs:
      # 以下参数为 AgentExecutor 初始化参数
      agent_engine: rllm
      agent_engine_kwargs:
        # 以下参数为 rLLMEngineWrapper 初始化参数
        simplify_think_content: true
        max_steps: 5
        max_prompt_length: 8192
        max_model_len: 8192
        n_parallel_agents: 8
        agent_class: agents.dtn_agent.dtn_agent.DTNAgent
        agent_args:
          parser_name: dtn
        env_class: agents.dtn_agent.environment.dtn_env.DTNEnvironment
        env_args:
          reward_fn: agents.dtn_agent.reward.reward_fn.dtn_reward_fn
          tool_url: http://10.44.101.61:5005/rca/train/
      infer_service:
        name: Qwen2.5-7B-Instruct # 依赖的 INFER 服务名称
        # 以下参数为 LLM 相关参数（兼容 OpenAI 格式）
        sampling_params:
          temperature: 0.6
          top_p: 0.95
          model_name: Qwen2.5-7B-Instruct # 依赖的 INFER 服务名称
        base_url: 0.0.0.0:8000
        api_key: EMPTY
        tokenizer: /opt/DPC/models/w00623271/original_ckpts/Qwen2.5-7B-Instruct # 采用外部服务时，该字段给定任意模型即可（待后续删除）
      remote_infer_service: { }
      trajectory_save_dir: /opt/DPC/models/f00938215/outputs/trajectory.jsonl
    resource_info: { }


# =============================================================
# Infer 预置服务：
# 1. 提供如：QWen / Deepseek 等大模型推理服务
# 2. 提供 OpenAI Chat 推理接口
# =============================================================
infer_instances:
  - name: Qwen2.5-7B-Instruct
    executor_num: 1
    executor_kwargs:
      # 以下参数为 InferExecutor 初始化参数
      engine: vllm_external # 共卡时推理适配引擎
      engine_kwargs:
        # 以下参数为 vLLMInferServer 初始化参数
        model_name: Qwen2.5-7B-Instruct
        model: /opt/DPC/models/w00623271/original_ckpts/Qwen2.5-7B-Instruct
        tensor_parallel_size: 4
        gpu_memory_utilization: 0.9
        max_model_len: 32768
        enable_prefix_caching: True
        trust_remote_code: True
        load_format: auto
    resource_info: [ ]