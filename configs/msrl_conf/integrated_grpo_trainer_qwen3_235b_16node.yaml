defaults:
  - model:
      - qwen3_235b

megatron_training:
  model: qwen3_235b
  use_fused_rmsnorm: true
  use_mcore_models: true
  sequence_parallel: true
  use_flash_attn: true
  no_masked_softmax_fusion: true
  attention_softmax_in_fp32: true
  no_gradient_accumulation_fusion: true
  use_fused_swiglu: true
  use_fused_rotary_pos_emb: true
  moe_alltoall_overlap_comm: true
  shape_order: BNSD
  bf16: true
  use_distributed_optimizer: true
  tokenizer_type: PretrainedFromHF
  tokenizer_name_or_path: /models/g00898995/weights/Qwen3-235B-A22B/
  global_batch_size: 64
  seq_length: 16384
  save_interval: 1000
  train_iters: 1000
  stage: ray_grpo
  attention_dropout: 0.0
  init_method_std: 0.01
  hidden_dropout: 0.0
  distributed_backend: nccl
  no_shared_storage: true
  variable_seq_lengths: true
  norm_epsilon: 1e-6
  dataset_additional_keys: ['labels', 'seq']
  data_path: /models/z00943413/AgenticRL_3.0/DTN_data/v0911_rca_39case_3tool_6turn/data/train_bin/rl #修改数据集路径
  split: 100,0,0
  swap_optimizer: true #单轮有
  reset_position_ids: true #单轮有

actor_config:
  model: qwen3_235b
  micro_batch_size: 1
  tensor_model_parallel_size: 4
  pipeline_model_parallel_size: 4
  noop_layers: "5,95"
  num_layers: 96
  expert_model_parallel_size: 8

  context_parallel_size: 4 # dp=总卡数/tp/pp cp要被dp整除 dp/cp要能整除 模为0
  context_parallel_algo: megatron_cp_algo
  cp_attention_mask_type: causal
  reset_attention_mask: true

  lr: 1e-6
  lr_decay_style: constant
  min_lr: 0.0
  weight_decay: 0.0
  lr_warmup_fraction: 0.0
  clip_grad: 1.0
  adam_beta1: 0.9
  adam_beta2: 0.95
  initial_loss_scale: 4096
  finetune: true
  load: /models/g00898995/ckpt/qwen3-235b/ #tp4pp4ep8权重路径: /models/g00898995/ckpt/qwen3-235b/
  save: ./ckpt
  no_load_optim: true
  no_load_rng: true
  no_save_optim: true #单轮有

  moe_tp_extend_ep: true #单轮有
  gemm_gradient_accumulation_fusion: true #单轮有
  recompute_granularity: full
  recompute_method: block
  recompute_num_layers: 24 #总层数/pipeline_model_parallel_size=96/4=24
  no_shuffle: true

rl_config:
  use_remove_padding: true
  use_integrated_worker: true
  ref_forward_micro_batch_size: 2 #单轮有
  actor_forward_micro_batch_size: 2 #单轮有
  guarantee_order: false
  blocking: true
  gamma: 1.0
  lam: 0.95
  adv_estimator: group_norm
  kl_penalty: low_var_kl #kl
  kl_ctrl_type: fixed
  init_kl_coef: 0.001
  mini_batch_size: 64 #32
  max_prompt_length: 8192
  epochs: 1
  clip_ratio: 0.2
  entropy_coeff: 0.0
  shuffle_mini_batch: false
  n_samples_per_prompt: 8
  actor_rollout_dispatch_size: 8 # 最大是总样本数16*8/推理实例数2 且是 n_samples_per_prompt的倍数
  rule_reward: true
  verifier_function: ["env_reward"]  # 修改
  verifier_weight: [1.0]
  verifier_parallel: 1
  verifier_timeout: 600
  use_tensorboard: true
  simplify_think_content: true
  actor_resource:
    num_npus: 128

generate_config:
  enforce_eager: true
  trust_remote_code: true
  enable_expert_parallel: true #单轮有

  # 推理时的并行配置
  enable_sleep_mode: false #单轮无
  load_format: megatron #单轮无
  infer_tensor_parallel_size: 4 #4
  infer_pipeline_parallel_size: 1
  infer_expert_parallel_size: 8 # 注意：需要配套修改runtime_env.yaml中的VLLM_DP_SIZE: '8'

  # vllm 模型相关设置
  enable_prefix_caching: true
  max_num_seqs: 16
  max_model_len: 32768
  max_num_batched_tokens: 2048 #可以配合gpu_memory_utilization改 这样num_seqs可以调大
  dtype: "bfloat16"
  gpu_memory_utilization: 0.75

  offload_train_optimizer: false
  offload_train_grad: true
  offload_train_param: true

  # agent execution配置
  base_url: http:xxx
  api_key: empty
  train_backend: mindspeed_rl

  # 采样配置
  sampling_config:
    logprobs: 1
    max_tokens: 100
    top_p: 0.9
    top_k: 50
    min_p: 0.01
    temperature: 0.9
    detokenize: false

agentic_env_config:
  namespace: agentic_raygroup
  agent_name: dtn
  max_steps: 5
  tool_url: http://10.44.101.61:8000/rca/train/
  rollout_output_path: ./logs/