data:
  test_dir: /models/w00610567/dataset/dtn_code/test   # 测试数据集路径
  retry_failed_only: false  # 是否只重试失败任务
  failed_tasks_file: "/path/to/failed_tasks_file"     # 失败任务记录文件路径（可选，默认自动生成）
  field_mapping:
    # 字段映射
    question: query
    ground_truth: answer

rl_config:
  max_prompt_length: 16384
  simplify_think_content: false

generate_config:
  n_parallel_agents: 8 # 并行度
  max_model_len: 24576
  # max_model_len: 98304
  # agent execution配置
  # base_url: http://10.50.89.113:17275/v1
  base_url: http://10.50.89.113:8000/v1
  api_key: empty
  model_path: /home/w00610567/model/Qwen3-32B/

  # 采样配置
  sampling_config:
    # model_name: openai/gpt-5
    model_name: /models/d00896564/original_ckpts/Qwen3-32B
    max_tokens: 40960
    top_p: 0.95
    # top_k: 50
    # min_p: 0.01
    temperature: 0.6
    detokenize: false

agentic_env_config:
  namespace: agentic_raygroup
  max_steps: 8
  agent_name: dtn_code
  tool_url: /home/w00610567/dataset/dtn_code/shutong_agentic/dtn_l2_all_info
  rollout_output_path: /home/w00610567/dataset/dtn_code/save_ckpts/gpt-1031