# =============================================================
# Agentic RL提供两种运行模式：
# 1. SERVE MODE     服务化部署，提供 HTTP/HTTPS 访问能力（如：多轮对话、模型推理等）
# 2. DIRECT MODE    直连模式，提供单次 JOB 执行能力（如：单次训练作业等）
# =============================================================
agentic_ai:
  mode: direct # 模式选择：serve | direct
  log_level: DEBUG
  log_dir: /var/log/

serve_conf:
  host: 0.0.0.0
  port: 8030

direct_conf:
  entrypoints:
    - job_type: train
      job_name: ${train_instances.0.name} # 即将训练的任务名称（默认为 `train_instances` 的第一个）
      job_kwargs: { }

# =============================================================
# Train 预定义任务：
# 1. 预定义任务包括采用RL框架类型、参数等等，初始化时占用资源，触发后开始训练（支持开始、暂停、取消）
# 2. SERVE 模式下，预定义任务列表默认为空; DIRECT 模式下，初始化任务等待触发训练（触发：direct_conf.entrypoints）
# =============================================================

# 根据rl框架和模型选择不同的模板，模板文件在msrl_conf/verl_conf路径下
defaults:
  - msrl_conf: base_integrated_grpo_trainer_template_qwen3_30b  # 参数值在msrl_conf中被覆盖
  - verl_conf: null
  - _self_

# 覆盖MSRL模板中的参数
msrl_conf:
  megatron_training:
    global_batch_size: 8
    train_iters: 10
    tokenizer_name_or_path: /opt/DPC/models/l00649956/models/Qwen3-30B-A3B
    data_path: /opt/DPC/models/l00619320/code/AGENTIC_RL_WS/AgenticRL_Binary_Files/dataset/deepscaler_math_01/rl
    dataset_additional_keys: [ 'labels' ]
  actor_config:
    load: /opt/DPC/models/l00649956/save_ckpts/qwen3_30b/new_tp4pp1ep2
    save: /opt/DPC/models/l00619320/outputs/ckpts/qwen3_30b
    tensor_model_parallel_size: 4
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
  rl_config:
    n_samples_per_prompt: 4
    actor_resource:
      num_npus: 16
  generate_config:
    # 并行参数必须保持与依赖 INFER 服务的一致，即 ${infer_instances.0} 中的参数
    infer_tensor_parallel_size: 4
    infer_pipeline_parallel_size: 1
    infer_expert_parallel_size: 1
    enable_expert_parallel: true
    # one step off配置
    init_num_group_batches: 15
    max_queue_size: 16
    train_backend: mindspeed_rl
    weight_save_dir: /opt/DPC/models/l00619320/outputs/save_weights
    update_weights_interval: 1
    ckpt_delta: 4
    data_optimized: false

train_instances:
  - name: RL-QWEN-30B-WITH-MATH-16NPU
    executor_num: 1
    executor_kwargs:
      # 以下参数为 TrainExecutor 初始化参数
      work_mode: one_step_off  # hybrid(共卡) | one_step_off(分离) | dummy_train (训练只启动controller, 适配纯rollout验证)
      cluster_mode: train
      rl_framework: mindspeed_rl
      rl_framework_kwargs:
        # 以下参数为 MindSpeed RL 初始化参数
        msrl_conf: ${msrl_conf}
      agent_service: ${agent_instances.0.name}  # 依赖的 AGENT 服务名称（默认为 `agent_instances` 的第一个）
      infer_service: ${infer_instances.0.name}  # 依赖的 INFER 服务名称（默认为 `infer_instances` 的第一个）
    resource_info: [ ]  # MSRL 训练采用 RAY 实现资源分配，在 Executor 层不做资源限制


# =============================================================
# Agent 预置服务：
# 1. 提供如：Math / WebSearch 等智能体对话服务
# =============================================================
agent_instances:
  - name: MATH-AGENT
    executor_num: 1
    executor_kwargs:
      # 以下参数为 AgentExecutor 初始化参数
      agent_engine: rllm
      agent_engine_kwargs:
        # 以下参数为 rLLMEngineWrapper 初始化参数
        agent_name: math # RLLMEngineWrapper内置Agent，修改参见：agents/agents_mapping.py
        simplify_think_content: true
        max_steps: 5
        max_prompt_length: 8192
        max_model_len: 8192
        n_parallel_agents: 8
        tokenizer: ${hydra:runtime.cwd}/AgenticRL_Binary_Files/models/Qwen2.5-7B-Instruct
      infer_service_params: # 每轮对话时的 sampling params
        temperature: 0.6
        top_p: 0.95
        max_tokens: 128
        model: ${infer_instances.0.name} # 依赖的 INFER 服务名称（默认为 `infer_instances` 的第一个）
      trajectory_save_dir: ${hydra:runtime.cwd}/outputs/trajectory.jsonl
    resource_info: [ ]


# =============================================================
# Infer 预置服务：
# 1. 提供如：QWen / Deepseek 等大模型推理服务
# 2. 提供 OpenAI Chat 推理接口
# =============================================================

infer_instances:
  - name: QWEN3-30B-A3B
    executor_num: 1
    executor_kwargs:
      # 以下参数为 InferExecutor 初始化参数
      engine: vllm_mp
      engine_kwargs:
        # 以下参数为 vLLMInferServer 初始化参数
        host: 0.0.0.0
        port: 8333
        model_name: ${...name} # 模型名称，最好和外层 name 字段保持一致
        model: /opt/DPC/models/l00649956/models/Qwen3-30B-A3B

        tensor_parallel_size: 4
        enable_expert_parallel: true
        data_parallel_size: 4
        data_parallel_size_local: 2
        data_parallel_address: EMPTY
        data_parallel_rpc_port: 13590

        max_num_seqs: 16
        max_model_len: 4096
        gpu_memory_utilization: 0.9
        trust_remote_code: true
        distributed_executor_backend: mp
    resource_info:
      - NPU: 8
      - NPU: 8